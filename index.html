<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>自己紹介 - あきと</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      width: 300px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .name {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 14px;
      color: #ccc;
      margin-bottom: 20px;
    }

    .desc {
      font-size: 16px;
      line-height: 1.5;
    }

    .btn {
      margin-top: 25px;
      padding: 10px 20px;
      border: none;
      border-radius: 25px;
      background: #00c6ff;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #0072ff;
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="name">あきと</div>
    <div class="subtitle">Student / Future Creator</div>
    <div class="desc">
      はじめまして！あきとです。<br>
      かっこいいものや新しいことが好きで、日々いろんなことに挑戦しています。
    </div>
    <button class="btn">Follow Me</button>
  </div>

</body>
</html>
