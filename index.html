<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スマブラ風ゲーム（完成版＋ステージ＋操作表示）</title>
<style>
body { margin:0; background:#111; color:#fff; font-family:sans-serif; }
#wrap { width:800px; margin:0 auto; }
canvas { display:block; background:linear-gradient(#1e1e1e,#444); }
#ui { display:flex; justify-content:space-between; gap:12px; padding:10px 0; }
.panel { background:#222; border-radius:10px; padding:10px 14px; box-shadow:0 4px 12px rgba(0,0,0,.5); }
.title { font-weight:bold; margin-bottom:6px; }
.key { display:inline-block; padding:2px 6px; margin:0 2px; border-radius:6px; background:#333; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="800" height="420"></canvas>
  <div id="ui">
    <div class="panel">
      <div class="title">操作（プレイヤー）</div>
      <div>
        移動：<span class="key">A</span>/<span class="key">D</span>　ジャンプ：<span class="key">W</span>（2段）<br>
        近接攻撃：<span class="key">F</span>　飛び道具：<span class="key">G</span>
      </div>
    </div>
    <div class="panel">
      <div class="title">ルール</div>
      <div>
        ダメージ％が高いほど吹っ飛びが強化。<br>
        画面外へ落とせば勝利！
      </div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const gravity = 0.5;
const keys = {};
const projectiles = [];
let gameOver = false;

// =====================
// ステージ（足場）
// =====================
const platforms = [
  {x:0, y:370, w:800, h:50},            // 地面
  {x:150, y:260, w:180, h:12},          // 左足場
  {x:470, y:260, w:180, h:12},          // 右足場
  {x:320, y:180, w:160, h:12},          // 中央上
];

function drawStage(){
  // 背景の簡易装飾
  const grad = ctx.createLinearGradient(0,0,0,canvas.height);
  grad.addColorStop(0,'#0f2027');
  grad.addColorStop(1,'#203a43');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // 足場
  ctx.fillStyle = '#9aa';
  platforms.forEach(p=>{
    ctx.fillRect(p.x,p.y,p.w,p.h);
  });
}

// =====================
// キャラ
// =====================
class Fighter {
  constructor(x, color, isPlayer1 = true) {
    this.x = x; this.y = 300;
    this.vx = 0; this.vy = 0;
    this.width = 40; this.height = 60;
    this.color = color;

    this.percent = 0;
    this.attacking = false;
    this.attackCooldown = 0;

    this.facing = isPlayer1 ? 1 : -1;
    this.hit = false;

    this.knockbackX = 0; this.knockbackY = 0;
    this.jumpCount = 0;
  }

  draw(){
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x,this.y,this.width,this.height);

    if(this.attacking){
      ctx.fillStyle = 'yellow';
      const ax = this.facing===1 ? this.x+this.width : this.x-30;
      ctx.fillRect(ax,this.y+20,30,20);
    }
  }

  physics(){
    if (this.attackCooldown>0) this.attackCooldown--;

    this.x += this.vx + this.knockbackX;
    this.y += this.vy + this.knockbackY;

    this.knockbackX *= 0.9; this.knockbackY *= 0.9;

    if(this.vx!==0) this.facing = this.vx>0?1:-1;

    this.vy += gravity;

    // 足場との当たり（上からのみ）
    let onGround = false;
    platforms.forEach(p=>{
      const wasAbove = (this.y + this.height - this.vy) <= p.y;
      const isFalling = this.vy >= 0;
      const overlapX = this.x + this.width > p.x && this.x < p.x + p.w;
      const willCross = this.y + this.height >= p.y && this.y + this.height <= p.y + p.h + 20;

      if (wasAbove && isFalling && overlapX && willCross) {
        this.y = p.y - this.height;
        this.vy = 0;
        this.jumpCount = 0;
        onGround = true;
      }
    });

    this.draw();
  }

  jump(){
    if(this.jumpCount < 2){
      this.vy = -10;
      this.jumpCount++;
    }
  }

  attack(){
    if(this.attackCooldown>0) return;
    this.attacking = true; this.hit = false;
    this.attackCooldown = 25;
    setTimeout(()=>{ this.attacking=false; },120);
  }
}

// =====================
// 弾
// =====================
class Projectile{
  constructor(x,y,dir,color){
    this.x=x; this.y=y; this.r=5; this.vx=7*dir; this.color=color;
  }
  update(){
    this.x+=this.vx;
    ctx.fillStyle=this.color;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill();
  }
}

const p1 = new Fighter(100,'cyan',true);
const p2 = new Fighter(600,'red',false);

// 入力
window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key==='f') p1.attack();
  if(e.key==='g') projectiles.push(new Projectile(p1.x+p1.width,p1.y+30,p1.facing,'cyan'));
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });

// 当たり判定
function hit(a,b){
  if(!a.attacking || a.hit) return false;
  const ax = a.facing===1 ? a.x+a.width : a.x-30;
  return ax < b.x+b.width && ax+30 > b.x && a.y < b.y+b.height && a.y+a.height > b.y;
}

// CPU
function cpu(){
  const d = p1.x - p2.x;
  if(Math.abs(d)>70){ p2.vx = d>0?2:-2; }
  else {
    p2.vx=0;
    if(Math.random()<0.05) p2.attack();
    if(Math.random()<0.01) projectiles.push(new Projectile(p2.x,p2.y+30,p2.facing,'red'));
  }
  if(Math.random()<0.01) p2.jump();
}

// ループ
function loop(){
  if(gameOver) return;

  drawStage();

  // 操作
  p1.vx=0;
  if(keys['a']) p1.vx=-4;
  if(keys['d']) p1.vx=4;
  if(keys['w']) p1.jump();

  cpu();

  p1.physics();
  p2.physics();

  // 近接
  if(hit(p1,p2)){
    p2.percent += 5;
    p2.knockbackX = (5 + p2.percent*0.1) * p1.facing;
    p2.knockbackY = -4 - p2.percent*0.05;
    p1.hit = true;
  }
  if(hit(p2,p1)){
    p1.percent += 5;
    p1.knockbackX = (5 + p1.percent*0.1) * p2.facing;
    p1.knockbackY = -4 - p1.percent*0.05;
    p2.hit = true;
  }

  // 弾
  projectiles.forEach((p,i)=>{
    p.update();
    if(p.x>p1.x && p.x<p1.x+p1.width && p.y>p1.y && p.y<p1.y+p1.height){
      p1.percent += 3; p1.knockbackX = 6*Math.sign(p.vx); projectiles.splice(i,1);
    }
    if(p.x>p2.x && p.x<p2.x+p2.width && p.y>p2.y && p.y<p2.y+p2.height){
      p2.percent += 3; p2.knockbackX = 6*Math.sign(p.vx); projectiles.splice(i,1);
    }
  });

  // UI
  ctx.fillStyle='#fff'; ctx.font='20px sans-serif';
  ctx.fillText('P1: '+Math.floor(p1.percent)+'%', 20, 30);
  ctx.fillText('CPU: '+Math.floor(p2.percent)+'%', 650, 30);

  // 場外
  function out(p){ return p.x<-120 || p.x>canvas.width+120 || p.y>canvas.height+120; }
  if(out(p1)||out(p2)){
    gameOver=true;
    ctx.font='40px sans-serif';
    ctx.fillText(out(p1)?'CPU Wins':'Player Wins', 250, 200);
    return;
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
